version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - staticcheck
    - gocritic
    - govet
    - ineffassign
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Writer).Write
        - (*os.File).Close
    gosec:
      excludes:
        - G101
        - G104
        - G115
        - G122
        - G204
        - G304
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
