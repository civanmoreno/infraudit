name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -o infraudit .

      - name: Test
        run: go test -race -count=1 ./...

      - name: Coverage
        run: go test -coverprofile=coverage.out ./...
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
        continue-on-error: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run

      - name: Verify binary
        run: ./infraudit --version

      - name: Verify checks registered
        run: ./infraudit list | tail -1

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version from source
        id: version
        run: |
          VERSION=$(grep 'Version =' internal/version/version.go | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        run: |
          if git tag -l "v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Build linux/amd64
        if: steps.check_release.outputs.EXISTS == 'false'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o dist/infraudit-linux-amd64 .

      - name: Build linux/arm64
        if: steps.check_release.outputs.EXISTS == 'false'
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o dist/infraudit-linux-arm64 .

      - name: Generate checksums
        if: steps.check_release.outputs.EXISTS == 'false'
        working-directory: dist
        run: sha256sum infraudit-* > checksums.txt

      - name: Generate SBOM
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom.spdx.json
          output-file: dist/sbom.spdx.json

      - name: Install cosign
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          for f in dist/infraudit-*; do
            cosign sign-blob --yes --output-signature "${f}.sig" "$f"
          done

      - name: Create release
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: infraudit v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          files: |
            dist/infraudit-linux-amd64
            dist/infraudit-linux-amd64.sig
            dist/infraudit-linux-arm64
            dist/infraudit-linux-arm64.sig
            dist/checksums.txt
            dist/sbom.spdx.json
